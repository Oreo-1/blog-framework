<style>
  :root {
    /* --- Background Colors --- */
    --bg-main: #0d1117;
    --bg-card: #212830;

    /* --- Text Colors --- */
    --text-primary: #f0f6fc;

    /* --- Shadows & Effects --- */
    --shadow-card: rgba(0, 0, 0, 0.2);
    --shadow-card-hover: rgba(0, 0, 0, 0.35);
  }

  main {
    background-color: var(--bg-main);
    padding: 0;
    margin: 0;
    max-width: 100%;
    box-shadow: none;
    /* padding: 20px; */
  }

  .taitel {
    font-size: 50px;
    margin-top: 100px;
    /* margin-left: 40px; */
    text-align: center;
    line-height: 40px;
    color: var(--text-primary); /* Added for consistency */
  }

  .TeNgAh {
    text-align: center;
  }

  .imej {
    border-radius: 10px;
    height: 200px;
    width: auto;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 40px;
    margin: 40px 120px 40px 120px;
  }

  .grid-item {
    background-color: var(--bg-card);
    color: var(--text-primary);
    padding: 50px 10px 50px 10px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0px 0px 10px var(--shadow-card);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .grid-link {
    text-decoration: none;
    font-size: 40px;
    font-weight: bold;
    color: var(--text-primary); /* Ensures link text inherits color */
  }

  .grid-item:hover {
    transform: translateY(-0.2rem);
    box-shadow: 0 10px 10px var(--shadow-card-hover);
  }

  /* Responsive styles for mobile devices */
  @media (max-width: 1000px) {
    main {
      padding: 0;
    }

    .taitel {
      line-height: normal;
      font-size: 18px;
    }

    .grid-container {
      grid-template-columns: 1fr;
      /* 1 column on mobile */
      grid-template-rows: auto;
      /* Rows adjust automatically */
      padding: 0;
      margin: 40px;
    }
  }
</style>
